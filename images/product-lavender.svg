<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C490E8"/>
      <stop offset="40%" stop-color="#9B5CC4"/>
      <stop offset="100%" stop-color="#7B3FA8"/>
    </linearGradient>
    <linearGradient id="pShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
    <linearGradient id="pCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E4EC"/>
      <stop offset="50%" stop-color="#D0C8D8"/>
      <stop offset="100%" stop-color="#C0B8C8"/>
    </linearGradient>
    <linearGradient id="pLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(200,160,240,0.5)"/>
      <stop offset="100%" stop-color="rgba(160,100,210,0.3)"/>
    </linearGradient>
    <filter id="pShadow">
      <feDropShadow dx="5" dy="10" stdDeviation="15" flood-color="rgba(100,50,160,0.35)"/>
    </filter>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bottle shadow on ground -->
  <ellipse cx="200" cy="680" rx="80" ry="10" fill="rgba(100,50,160,0.12)"/>

  <!-- Bottle body - hourglass/curved shape matching real photo -->
  <path d="
    M145,120
    Q140,120 138,130 L132,180
    Q125,220 122,260
    Q118,310 120,340
    Q122,370 128,390
    L135,420
    Q128,450 125,480
    Q120,530 120,570
    Q120,610 128,640
    Q135,660 150,668
    L250,668
    Q265,660 272,640
    Q280,610 280,570
    Q280,530 275,480
    Q272,450 265,420
    L272,390
    Q278,370 280,340
    Q282,310 278,260
    Q275,220 268,180
    L262,130
    Q260,120 255,120
    Z
  " fill="url(#pBody)" filter="url(#pShadow)"/>

  <!-- Shine overlay -->
  <path d="
    M145,120
    Q140,120 138,130 L132,180
    Q125,220 122,260
    Q118,310 120,340
    Q122,370 128,390
    L135,420
    Q128,450 125,480
    Q120,530 120,570
    Q120,610 128,640
    Q135,660 150,668
    L250,668
    Q265,660 272,640
    Q280,610 280,570
    Q280,530 275,480
    Q272,450 265,420
    L272,390
    Q278,370 280,340
    Q282,310 278,260
    Q275,220 268,180
    L262,130
    Q260,120 255,120
    Z
  " fill="url(#pShine)"/>

  <!-- Transparency/liquid effect -->
  <ellipse cx="200" cy="560" rx="60" ry="80" fill="url(#pLiquid)"/>

  <!-- Cap -->
  <rect x="162" y="82" width="76" height="42" rx="6" fill="url(#pCap)"/>
  <rect x="170" y="70" width="60" height="18" rx="10" fill="#D8D0E0"/>
  <ellipse cx="200" cy="70" rx="25" ry="6" fill="#E0D8E8"/>
  <rect x="165" y="118" width="70" height="6" rx="3" fill="rgba(0,0,0,0.08)"/>

  <!-- Brand label area -->
  <rect x="138" y="210" width="124" height="200" rx="8" fill="rgba(255,255,255,0.12)"/>

  <!-- Logo text: it's smile -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" font-style="italic">it's</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="2">smile</text>
  <!-- Smile curve -->
  <path d="M175,285 Q200,300 225,285" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 妙可净 -->
  <text x="175" y="260" text-anchor="end" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.9)">妙可净</text>

  <!-- Tagline -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-style="italic">Explore the cleaning</text>
  <text x="200" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-style="italic">power of nature</text>

  <!-- Perilla leaf icon -->
  <circle cx="200" cy="370" r="22" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
  <path d="M200,355 Q190,365 192,378 Q195,385 200,388 Q205,385 208,378 Q210,365 200,355Z" fill="white"/>
  <line x1="200" y1="358" x2="200" y2="385" stroke="rgba(155,92,196,0.5)" stroke-width="0.8"/>

  <text x="200" y="405" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Perilla</text>

  <!-- Product info -->
  <text x="200" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="white">99%天然植物精萃*</text>

  <text x="200" y="480" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">SILK &amp; WOOL WASH</text>
  <text x="200" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">妙可净真丝羊毛洗衣液</text>

  <!-- Volume -->
  <text x="200" y="620" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="white">255 mL (8.6 fl oz)</text>

  <!-- Bottom highlight -->
  <ellipse cx="200" cy="665" rx="60" ry="3" fill="rgba(255,255,255,0.15)"/>
</svg>
