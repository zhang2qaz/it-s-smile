  <circle cx="200" cy="370" r="22" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
  <path d="M195,358 Q188,368 192,380 Q195,385 200,386 Q205,385 208,380 Q212,368 205,358 Q200,354 195,358Z" fill="#4CAF50"/>
  <path d="M192,362 Q186,370 190,378" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

  <text x="200" y="405" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Tea Tree Oil</text>

  <!-- Product info -->
  <text x="200" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="white">99%天然植物精萃*</text>

  <text x="200" y="480" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">LINGERIE LIQUID DETERGENT</text>
  <text x="200" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">妙可净内衣洗衣液</text>

  <text x="200" y="620" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="white">255 mL (8.6 fl oz)</text>

  <ellipse cx="200" cy="665" rx="60" ry="3" fill="rgba(255,255,255,0.15)"/>
