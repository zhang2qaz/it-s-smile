<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="yBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD040"/>
      <stop offset="40%" stop-color="#F0A820"/>
      <stop offset="100%" stop-color="#D89010"/>
    </linearGradient>
    <linearGradient id="yShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>
    <linearGradient id="yCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0ECE0"/>
      <stop offset="50%" stop-color="#D8D0C0"/>
      <stop offset="100%" stop-color="#C8C0B0"/>
    </linearGradient>
    <linearGradient id="yLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,220,80,0.5)"/>
      <stop offset="100%" stop-color="rgba(240,168,32,0.3)"/>
    </linearGradient>
    <filter id="yShadow">
      <feDropShadow dx="5" dy="10" stdDeviation="15" flood-color="rgba(180,120,0,0.3)"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="680" rx="80" ry="10" fill="rgba(180,120,0,0.12)"/>

  <!-- Bottle body -->
  <path d="
    M145,120
    Q140,120 138,130 L132,180
    Q125,220 122,260
    Q118,310 120,340
    Q122,370 128,390
    L135,420
    Q128,450 125,480
    Q120,530 120,570
    Q120,610 128,640
    Q135,660 150,668
    L250,668
    Q265,660 272,640
    Q280,610 280,570
    Q280,530 275,480
    Q272,450 265,420
    L272,390
    Q278,370 280,340
    Q282,310 278,260
    Q275,220 268,180
    L262,130
    Q260,120 255,120
    Z
  " fill="url(#yBody)" filter="url(#yShadow)"/>

  <path d="
    M145,120
    Q140,120 138,130 L132,180
    Q125,220 122,260
    Q118,310 120,340
    Q122,370 128,390
    L135,420
    Q128,450 125,480
    Q120,530 120,570
    Q120,610 128,640
    Q135,660 150,668
    L250,668
    Q265,660 272,640
    Q280,610 280,570
    Q280,530 275,480
    Q272,450 265,420
    L272,390
    Q278,370 280,340
    Q282,310 278,260
    Q275,220 268,180
    L262,130
    Q260,120 255,120
    Z
  " fill="url(#yShine)"/>

  <ellipse cx="200" cy="560" rx="60" ry="80" fill="url(#yLiquid)"/>

  <!-- Cap -->
  <rect x="162" y="82" width="76" height="42" rx="6" fill="url(#yCap)"/>
  <rect x="170" y="70" width="60" height="18" rx="10" fill="#E0D8C8"/>
  <ellipse cx="200" cy="70" rx="25" ry="6" fill="#E8E0D0"/>
  <rect x="165" y="118" width="70" height="6" rx="3" fill="rgba(0,0,0,0.06)"/>

  <!-- Brand label area -->
  <rect x="138" y="210" width="124" height="200" rx="8" fill="rgba(255,255,255,0.12)"/>

  <!-- Logo -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" font-style="italic">it's</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="2">smile</text>
  <path d="M175,285 Q200,300 225,285" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="175" y="260" text-anchor="end" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.9)">妙可净</text>

  <text x="200" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-style="italic">Explore the cleaning</text>
  <text x="200" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-style="italic">power of nature</text>

