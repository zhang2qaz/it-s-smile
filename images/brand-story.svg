  <text x="300" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="rgba(255,255,255,0.12)" letter-spacing="8">妙可净</text>
  <text x="300" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="6">妙可净</text>
