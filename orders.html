<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户订单 - 妙可净后台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <div class="logo-full">
          <span class="logo-cn">妙可净</span>
          <span class="logo-en">it's smile</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="admin.html">订单管理</a>
        <a href="orders.html" class="active">客户订单</a>
        <a href="index.html">返回前台</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="cart-btn">🛒 <span class="cart-badge"></span></a>
        <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('mobile-open')">☰</button>
      </div>
    </nav>
  </header>

  <!-- Orders Page -->
  <div class="orders-page">
    <div class="container">
      <h1 class="page-title">📋 我的订单</h1>

      <!-- Tabs -->
      <div class="orders-tabs">
        <button class="orders-tab active" data-status="all" onclick="renderOrders('all')">全部</button>
        <button class="orders-tab" data-status="pending" onclick="renderOrders('pending')">待处理</button>
        <button class="orders-tab" data-status="processing" onclick="renderOrders('processing')">处理中</button>
        <button class="orders-tab" data-status="shipped" onclick="renderOrders('shipped')">已发货</button>
        <button class="orders-tab" data-status="delivered" onclick="renderOrders('delivered')">已完成</button>
        <button class="orders-tab" data-status="cancelled" onclick="renderOrders('cancelled')">已取消</button>
      </div>

      <!-- Orders List -->
      <div id="orders-list">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>&copy; 2024 绍兴智洁洗涤用品科技有限公司 版权所有</span>
        <span>浙ICP备XXXXXXXX号</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
