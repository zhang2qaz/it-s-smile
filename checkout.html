<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>结算 - 妙可净 it's smile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <img src="images/logo-dark.png" alt="妙可净 it's smile" class="logo-img">
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="products.html">全部产品</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="cart-btn">🛒 <span class="cart-badge"></span></a>
        <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('mobile-open')">☰</button>
      </div>
    </nav>
  </header>

  <!-- Checkout Page -->
  <div class="checkout-page">
    <div class="container">
      <h1 class="page-title">📋 确认订单</h1>
      <form onsubmit="submitOrder(event)">
        <div class="checkout-layout">
          <div>
            <!-- Shipping Info -->
            <div class="form-section">
              <h3>📍 收货信息</h3>
              <div class="form-row">
                <div class="form-group">
                  <label>收货人姓名 *</label>
                  <input type="text" name="name" placeholder="请输入收货人姓名" required>
                </div>
                <div class="form-group">
                  <label>手机号码 *</label>
                  <input type="tel" name="phone" placeholder="请输入11位手机号码" required pattern="1\d{10}">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>省份</label>
                  <select name="province">
                    <option value="">请选择省份</option>
                    <option value="浙江省">浙江省</option>
                    <option value="江苏省">江苏省</option>
                    <option value="上海市">上海市</option>
                    <option value="安徽省">安徽省</option>
                    <option value="福建省">福建省</option>
                    <option value="江西省">江西省</option>
                    <option value="山东省">山东省</option>
                    <option value="广东省">广东省</option>
                    <option value="湖北省">湖北省</option>
                    <option value="湖南省">湖南省</option>
                    <option value="河南省">河南省</option>
                    <option value="河北省">河北省</option>
                    <option value="北京市">北京市</option>
                    <option value="天津市">天津市</option>
                    <option value="重庆市">重庆市</option>
                    <option value="四川省">四川省</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>城市</label>
                  <input type="text" name="city" placeholder="请输入城市">
                </div>
              </div>
              <div class="form-group">
                <label>详细地址 *</label>
                <textarea name="address" rows="3" placeholder="请输入详细收货地址（街道、门牌号等）" required></textarea>
              </div>
              <div class="form-group">
                <label>订单备注</label>
                <textarea name="note" rows="2" placeholder="如有特殊要求，请在此备注"></textarea>
              </div>
            </div>

            <!-- Payment -->
            <div class="form-section">
              <h3>💳 支付方式</h3>
              <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:8px;padding:16px 24px;border:2px solid var(--primary);border-radius:var(--radius);cursor:pointer;background:var(--gray-50);">
                  <input type="radio" name="payment" value="wechat" checked style="width:auto;">
                  <span style="font-weight:600;">微信支付</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;padding:16px 24px;border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;">
                  <input type="radio" name="payment" value="alipay" style="width:auto;">
                  <span style="font-weight:600;">支付宝</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;padding:16px 24px;border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;">
                  <input type="radio" name="payment" value="cod" style="width:auto;">
                  <span style="font-weight:600;">货到付款</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Order Summary -->
          <div>
            <div class="cart-summary">
              <h3>订单商品</h3>
              <div id="checkout-order-items">
                <!-- Rendered by JS -->
              </div>
              <div id="checkout-total" style="margin-top:16px;">
                <!-- Rendered by JS -->
              </div>
              <button type="submit" class="btn btn-primary checkout-btn">提交订单</button>
              <a href="cart.html" class="btn btn-outline checkout-btn" style="margin-top:8px;">返回购物车</a>
              <p style="font-size:0.8rem;color:var(--gray-400);text-align:center;margin-top:12px;">提交订单即表示您同意我们的服务条款</p>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>&copy; 2024 绍兴智洁洗涤用品科技有限公司 版权所有</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
