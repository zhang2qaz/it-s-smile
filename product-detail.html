<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - 妙可净 it's smile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <img src="images/logo-dark.png" alt="妙可净 it's smile" class="logo-img">
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="products.html" class="active">全部产品</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="cart-btn">🛒 <span class="cart-badge"></span></a>
        <button class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('mobile-open')">☰</button>
      </div>
    </nav>
  </header>

  <!-- Product Detail -->
  <div class="product-detail">
    <div class="container" id="product-detail-container">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Related Products -->
  <section class="section" style="background:var(--gray-50);">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">推荐产品</h2>
      </div>
      <div class="products-grid" id="related-products"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>&copy; 2024 绍兴智洁洗涤用品科技有限公司 版权所有</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Render related products (exclude current)
      const params = new URLSearchParams(window.location.search);
      const currentId = parseInt(params.get('id'));
      const relatedIds = PRODUCTS.filter(p => p.id !== currentId).slice(0, 3).map(p => p.id);
      renderProductCards('related-products', relatedIds);
    });
  </script>
</body>
</html>
